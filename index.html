<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HULK PTT REMOTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #0f0; padding-top: 30px; user-select: none; }
        .btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid #0f0;
            background: #111; color: #0f0; font-weight: bold; font-size: 24px;
            box-shadow: 0 0 30px #0f0; cursor: pointer; touch-action: none; margin-top: 20px;
        }
        .btn:disabled { border-color: #444; color: #444; box-shadow: none; cursor: not-allowed; }
        .btn:active:not(:disabled) { background: #0f0; color: #000; transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 16px; color: #888; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: red; margin-right: 8px; }
        #debug { font-size: 11px; color: #444; margin-top: 20px; text-align: left; padding: 10px; border: 1px solid #222; width: 85%; display: inline-block; font-family: monospace; overflow-y: auto; max-height: 100px; }
    </style>
</head>
<body>
    <h1>HULK MQTT</h1>
    <div><span class="indicator" id="ind"></span><span id="state">ПОДКЛЮЧЕНИЕ...</span></div>
    <button id="talkBtn" class="btn" disabled>ЖДИТЕ...</button>
    <p id="status">Настройка системы...</p>
    <div id="debug">Лог:<br></div>

<script>
    const talkBtn = document.getElementById('talkBtn');
    const statusText = document.getElementById('status');
    const stateText = document.getElementById('state');
    const debug = document.getElementById('debug');
    const ind = document.getElementById('ind');

    function log(m) { debug.innerHTML += "> " + m + "<br>"; debug.scrollTop = debug.scrollHeight; }

    // НАСТРОЙКИ SHIFTR.IO (Гармонизировано с ESP32)
    const MQTT_URL = "wss://public:public@broker.shiftr.io";
    const TOPIC = "hulk/audio/unique_99";
    
    let socket, audioContext, processor, stream, isActive = false;

    function connect() {
        log("Соединение с Shiftr (443)...");
        try {
            socket = new WebSocket(MQTT_URL, 'mqtt');
            socket.binaryType = "arraybuffer";

            socket.onopen = () => {
                log("WS открыт. Авторизация...");
                // Пакет CONNECT (бинарный код MQTT 3.1.1)
                socket.send(new Uint8Array([0x10, 12, 0, 4, 77, 81, 84, 84, 4, 2, 0, 60, 0, 0]));
            };

            socket.onmessage = (e) => {
                const data = new Uint8Array(e.data);
                if (data[0] === 0x20) { // CONNACK
                    log("УСПЕХ: В СЕТИ!");
                    ind.style.background = "#0f0";
                    stateText.innerText = "В СЕТИ (Shiftr)";
                    talkBtn.disabled = false;
                    talkBtn.innerText = "ГОВОРИТЬ";
                    statusText.innerText = "Готов!";
                }
            };

            socket.onclose = () => {
                log("Связь закрыта. Рестарт...");
                ind.style.background = "red";
                talkBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            socket.onerror = (e) => log("Ошибка сокета!");
        } catch (e) { log("Error: " + e); }
    }

    async function start(e) {
        if (e) e.preventDefault();
        if (isActive || socket.readyState !== 1) return;
        isActive = true;

        try {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
            await audioContext.resume();
            
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const input = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(2048, 1, 1);

            processor.onaudioprocess = (e) => {
                if (isActive && socket.readyState === 1) {
                    const data = e.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(data.length);
                    for (let i = 0; i < data.length; i++) {
                        let s = data[i] * 32767;
                        pcm[i] = (s > 32767) ? 32767 : (s < -32768 ? -32768 : s);
                    }
                    
                    // Формируем пакет Publish вручную
                    const t = TOPIC;
                    const payload = new Uint8Array(pcm.buffer);
                    const remain = 2 + t.length + payload.length;
                    const pkt = new Uint8Array(2 + remain);
                    
                    pkt[0] = 0x30; // Publish
                    pkt[1] = remain;
                    pkt[2] = 0; pkt[3] = t.length;
                    for(let i=0; i<t.length; i++) pkt[4+i] = t.charCodeAt(i);
                    pkt.set(payload, 4 + t.length);
                    
                    socket.send(pkt);
                }
            };

            input.connect(processor);
            processor.connect(audioContext.destination);
            statusText.innerText = "ТРАНСЛЯЦИЯ...";
            talkBtn.style.background = "#0f0";
        } catch (err) {
            log("Микрофон: " + err);
            statusText.innerText = "Ошибка микрофона";
            isActive = false;
        }
    }

    function stop(e) {
        if (e) e.preventDefault();
        isActive = false;
        if (processor) processor.disconnect();
        if (stream) stream.getTracks().forEach(t => t.stop());
        statusText.innerText = "ГОТОВ";
        talkBtn.style.background = "#111";
        log("СТОП");
    }

    talkBtn.addEventListener('pointerdown', start);
    talkBtn.addEventListener('pointerup', stop);
    talkBtn.addEventListener('pointerleave', stop);
    talkBtn.addEventListener('contextmenu', e => e.preventDefault());

    connect();
</script>
</body>
</html>

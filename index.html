<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><title>HULK PTT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #0f0; padding-top: 50px; }
        .btn { width: 220px; height: 220px; border-radius: 50%; border: 8px solid #0f0; background: #111; color: #0f0; font-size: 24px; cursor: pointer; touch-action: none; }
        .btn:active:not(:disabled) { background: #0f0; color: #000; }
        #log { font-size: 11px; color: #444; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <h1 id="stat">ПОДКЛЮЧЕНИЕ...</h1>
    <button id="talkBtn" class="btn" disabled>ЖДИТЕ</button>
    <div id="log"></div>
<script>
    const log = (m) => document.getElementById('log').innerHTML += "> " + m + "<br>";
    const MQTT_HOST = "://hivemq.com";
    const MQTT_PORT = 8000; // WebSocket порт
    const TOPIC = "hulk/audio/test_radio_1"; 
    let client, audioContext, processor, stream, isActive = false;

    function init() {
        log("Init MQTT...");
        client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, "web_" + Math.random().toString(16).substr(2, 4));
        client.onConnectionLost = () => { log("Lost"); setTimeout(init, 3000); };
        client.connect({
            onSuccess: () => {
                log("ONLINE!");
                document.getElementById('stat').innerText = "В СЕТИ";
                document.getElementById('talkBtn').disabled = false;
                document.getElementById('talkBtn').innerText = "ГОВОРИТЬ";
            },
            onFailure: (e) => { log("Fail: " + e.errorMessage); setTimeout(init, 5000); }
        });
    }

    async function start(e) {
        if (e) e.preventDefault();
        if (isActive || !client.connected) return;
        isActive = true;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000});
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const input = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(1024, 1, 1);
            processor.onaudioprocess = (e) => {
                if (isActive) {
                    const data = e.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(data.length);
                    for (let i = 0; i < data.length; i++) {
                        let s = data[i] * 32767;
                        pcm[i] = s > 32767 ? 32767 : (s < -32768 ? -32768 : s);
                    }
                    let msg = new Paho.MQTT.Message(pcm.buffer);
                    msg.destinationName = TOPIC;
                    client.send(msg);
                }
            };
            input.connect(processor); processor.connect(audioContext.destination);
        } catch (err) { log("Mic error: " + err); }
    }

    document.getElementById('talkBtn').onpointerdown = start;
    document.getElementById('talkBtn').onpointerup = () => {
        isActive = false;
        if (processor) processor.disconnect();
        if (stream) stream.getTracks().forEach(t => t.stop());
    };
    init();
</script>
</body></html>
